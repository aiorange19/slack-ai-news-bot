name: AI News Bot

on:
  schedule:
    - cron: "45 20 * * *" # UTC 20:45 = JST 05:45（遅延を見込んで朝7時前後狙い）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2

      - run: bundle install
      - run: ruby news_bot.rb
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TZ: Asia/Tokyo
          
